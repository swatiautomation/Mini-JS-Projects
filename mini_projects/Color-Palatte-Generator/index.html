<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=content_copy"
    />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button class="js-generate-button">
        <i class="fas fa-sync-alt"></i>Generate Palette
      </button>
      <div class="colorPalette">
        <div class="color">
          <div class="color-div" style="background-color: #e1f5fe"></div>

          <div class="copy-icon">
            <div class="color-name">#E1F5FE</div>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <div class="color">
          <div class="color-div" style="background-color: #e1f5fe"></div>

          <div class="copy-icon">
            <div class="color-name">#E1F5FE</div>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <div class="color">
          <div class="color-div" style="background-color: #e1f5fe"></div>

          <div class="copy-icon">
            <div class="color-name">#E1F5FE</div>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
