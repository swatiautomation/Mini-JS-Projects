<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Switcher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Switcher</h1>
      <div class="colorDiv">
        <button class="randomColor">Random Color</button>
        <input
          id="inputBox"
          type="text"
          placeholder="Enter a color or hex (e.g red or #f0)"
        />
        <button class="applyColor">Apply Color</button>
      </div>
      <p class="showColor">
        Current Color - <span class="currentColorValue">green</span>
      </p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
