<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <div class="container">
      <div class="quizBox">
        <div class="messageContainer">
          <div class="alert">Alert</div>
        </div>

        <div class="quizContainer">
          <div class="timer"></div>
          <h1>Let's play Quiz Game</h1>
          <div class="midSection">
            <div>
              Question <span class="attemptedQuestion">1</span> out of
              <span class="totalQuestions">5</span>
            </div>
            <div>score : <span class="score">0</span></div>
          </div>
          <div class="question">what is your favorite pet.?</div>

          <div class="options"></div>

          <div id="progressBarWrapper">
            <div id="progressBar"></div>
          </div>

          <div class="resultDiv">result</div>
          <div class="scoreCard"></div>
          <button class="btn nextBtn">NEXT</button>
        </div>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
